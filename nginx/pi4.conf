# TATKO PI Envanter — supertakimlar.com/pi4/
# Bu dosya RZ nginx container'ının conf.d klasörüne kopyalanır.
# RZ nginx'i "pi4-proxy" Docker ağına bağlanmalıdır.

upstream pi4_backend {
    server pi4-backend:8001;
}

upstream pi4_frontend {
    server pi4-frontend:80;
}

# API istekleri — /pi4/api/ → FastAPI (prefix soyularak iletilir)
location /pi4/api/ {
    proxy_pass         http://pi4_backend/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    add_header X-Content-Type-Options  "nosniff"           always;
    add_header X-Frame-Options         "DENY"              always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
}

# Frontend — /pi4/ → nginx static (React SPA)
location /pi4/ {
    proxy_pass         http://pi4_frontend/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-Proto $scheme;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-Frame-Options           "DENY"              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:;" always;
}
